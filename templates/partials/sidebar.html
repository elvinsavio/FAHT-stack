<div class="h-screen  hidden w-64 md:flex overflow-auto border border-border">
    <div class="p-4 w-full">
        <h2>Sidebar</h2>
        <ul class="space-y-2">
            <li><a href="#home" class="block px-3 py-2 rounded hover:bg-accent">Home</a></li> 
            <h3>
                Elements
            </h3>
            {% for element in elements %}
            <li><a href="{{ element.link }}" class="block w-full p-2 rounded hover:bg-accent">{{ element.name }}</a></li>
            {% endfor %}
        </ul>
    </div>
</div>
